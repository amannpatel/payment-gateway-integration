spring:
  datasource:
    url: jdbc:h2:mem:payment_gateway_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  webhooks:
    async-processing: false
  simulation:
    enabled: true
  retry:
    poll-interval-ms: 60000
  razorpay:
    mock-enabled: true