spring:
  application:
    name: payment-gateway-integration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/payment_gateway_ops?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

app:
  webhooks:
    async-processing: true
  retry:
    poll-interval-ms: 15000
  simulation:
    enabled: true
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_mock_key}
    key-secret: ${RAZORPAY_KEY_SECRET:rzp_test_mock_secret}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:rzp_test_webhook_secret}
    base-url: ${RAZORPAY_BASE_URL:https://api.razorpay.com}
    mock-enabled: ${RAZORPAY_MOCK_ENABLED:true}

resilience4j:
  circuitbreaker:
    instances:
      gatewayClient:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
  timelimiter:
    instances:
      gatewayClient:
        timeoutDuration: 3s

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5p trace=%X{correlationId:-na} thread=%t logger=%logger{36} msg=%m%n"